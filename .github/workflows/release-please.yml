name: release-please

# Watches Conventional Commits on main and opens/maintains a "release PR" that
# bumps the version in package.json and updates CHANGELOG.md. Merging that PR
# creates the GitHub Release + tag, which fires publish.yml -> npm publish.
#
#   fix:            -> patch (x.y.Z)
#   feat:           -> minor (x.Y.0)
#   feat!: / BREAKING CHANGE -> major (X.0.0)
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
